services:
  builder:
    build:
      context: ..
      dockerfile: Dockerfiles/Dockerfile-builder
    image: 'panther-builder:24.15.0-alpine3.23'
  runtime:
    build:
      context: ..
      dockerfile: Dockerfiles/Dockerfile-runtime
    image: 'panther-runtime:24.15.0-alpine3.23'

  server:
    depends_on:
      - builder
      - runtime
    build:
      context: ..
      dockerfile: Dockerfiles/Dockerfile-event-server
    image: event-server

  console:
    depends_on:
      - builder
      - runtime
    build:
      context: ..
      dockerfile: Dockerfiles/Dockerfile-event-console
    image: event-console

  monitors:
    depends_on:
      - builder
    build:
      context: ..
      dockerfile: Dockerfiles/Dockerfile-event-monitors
    image: event-monitors
